<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Scene</title>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .text {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 10;
      color: white;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 10px;
      font-family: Arial;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>
</head>
<body>

<div id="container">
  <div class="text">Наведи камеру на котика 🐱</div>
</div>

<script type="module" src="main.js"></script>

</body>
</html>
