<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Scene</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    #container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    .info {
      position: absolute;
      top: 14px;
      left: 14px;
      z-index: 20;
      color: white;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
    }

    .start-screen {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.82);
    }

    .start-box {
      width: min(92vw, 380px);
      padding: 24px;
      border-radius: 18px;
      text-align: center;
      color: white;
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 10px 40px rgba(0,0,0,0.35);
    }

    .start-box h1 {
      margin: 0 0 12px;
      font-size: 24px;
    }

    .start-box p {
      margin: 0 0 18px;
      font-size: 15px;
      line-height: 1.5;
      opacity: 0.92;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
    }

    .btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .error {
      margin-top: 14px;
      min-height: 22px;
      color: #ffd1d1;
      font-size: 14px;
      line-height: 1.4;
    }

    .hidden {
      display: none;
    }

    #camera-test-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
      background: #000;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>
</head>
<body>
  <div id="container">
    <video id="camera-test-video" autoplay muted playsinline></video>

    <div class="info">Наведи камеру на котика 🐱</div>

    <div id="startScreen" class="start-screen">
      <div class="start-box">
        <h1>Запуск AR</h1>
        <p>
          Натисни кнопку, дозволь доступ до камери, а потім наведи камеру на маркер.
        </p>
        <button id="startButton" class="btn">Увімкнути камеру</button>
        <div id="errorText" class="error"></div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
