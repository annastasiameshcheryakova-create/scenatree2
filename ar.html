<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Scene</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .panel {
      position: fixed;
      z-index: 30;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.45;
    }

    #topPanel {
      top: 14px;
      left: 14px;
      right: 14px;
    }

    #controls {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 30;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>
</head>
<body>
  <div id="container"></div>

  <div id="topPanel" class="panel">
    <div><strong>Статус:</strong> <span id="status">очікування запуску</span></div>
    <div><strong>Маркер:</strong> <span id="markerStatus">не знайдено</span></div>
    <div><strong>Порада:</strong> тримай marker.png окремо на іншому екрані або роздрукованим, не показуй ту саму сторінку самій собі.</div>
  </div>

  <div id="controls">
    <button id="startButton" class="btn">Запустити AR</button>
    <button id="stopButton" class="btn" disabled>Stop</button>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
