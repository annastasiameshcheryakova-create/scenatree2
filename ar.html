<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Scene</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: black;
    }

    .info {
      position: absolute;
      top: 15px;
      left: 15px;
      z-index: 20;
      color: white;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 14px;
      border-radius: 10px;
    }

    .start-screen {
      position: absolute;
      inset: 0;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.82);
    }

    .start-box {
      text-align: center;
      color: white;
      padding: 24px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.08);
      width: min(90vw, 360px);
    }

    .start-box h1 {
      font-size: 24px;
      margin: 0 0 12px;
    }

    .start-box p {
      font-size: 15px;
      line-height: 1.5;
      opacity: 0.92;
      margin: 0 0 18px;
    }

    .start-btn {
      border: none;
      border-radius: 999px;
      padding: 14px 24px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
    }

    .hidden {
      display: none;
    }

    .error {
      margin-top: 12px;
      font-size: 14px;
      color: #ffd4d4;
      min-height: 20px;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>
</head>
<body>
  <div id="container">
    <div class="info">Наведи камеру на котика 🐱</div>

    <div id="startScreen" class="start-screen">
      <div class="start-box">
        <h1>AR-проєкт</h1>
        <p>Натисни кнопку нижче, щоб надати доступ до камери та запустити розпізнавання маркера.</p>
        <button id="startButton" class="start-btn">Запустити камеру</button>
        <div id="errorText" class="error"></div>
      </div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
