<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Scene</title>

  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #container {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: #000;
    }

    #control {
      position: fixed;
      top: 16px;
      left: 16px;
      z-index: 20;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 15px;
      color: white;
      cursor: pointer;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .info {
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 20;
      max-width: 320px;
      color: white;
      background: rgba(0, 0, 0, 0.55);
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.45;
      font-size: 14px;
    }

    .status {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 20;
      max-width: 340px;
      color: white;
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.4;
      min-height: 20px;
    }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
      "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-three.prod.js"
    }
  }
  </script>
</head>
<body>
  <div id="control">
    <button id="startButton" class="btn">Start AR Camera</button>
    <button id="stopButton" class="btn" disabled>Stop</button>
  </div>

  <div id="status" class="status">Натисни Start AR Camera</div>

  <div class="info">
    Наведи камеру на маркер-котика. Коли маркер знайдеться, з’являться відео та 3 геометрії.
  </div>

  <div id="container"></div>

  <script type="module" src="main.js"></script>
</body>
</html>
